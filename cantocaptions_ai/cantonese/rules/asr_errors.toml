# Common ASR / homophone error fixes (legacy clean_subtitle_misc)
# Rules are applied in order, top to bottom, one re.sub pass each.
# Patterns/replacements use TOML literal (single-quoted) strings: backslashes are verbatim.

[[rules]]
pattern = '果陣'
replace = '嗰陣'
comment = 'promoted from legacy replace_standard_chinese'

[[rules]]
pattern = '果啲'
replace = '嗰啲'
