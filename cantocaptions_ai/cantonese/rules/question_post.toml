# Post-processing rules after coded question-particle step (legacy clean_question_final_particles)
# Rules are applied in order, top to bottom, one re.sub pass each.
# Patterns/replacements use TOML literal (single-quoted) strings: backslashes are verbatim.

[[rules]]
pattern = '(?<![пјҢгҖӮпјҒ!?.;пјҹпјӣвҖҰ])дҝӮе’Ә(?=[е‘Җе•Ҡеҗ–пјҹ])'
replace = 'пјҢдҝӮе’Ә'

[[rules]]
pattern = '[г—Һе–Ү]г—Һ'
replace = 'г—Һ'

[[rules]]
pattern = 'еҳ…пјҹ'
replace = 'р ёҸпјҹ'

[[rules]]
pattern = 'е•Ұе•ҰиҒІ'
replace = 'е—ұе—ұиҒІ'

[[rules]]
pattern = '([е•Ҡе–Һе–Үе•Ұг—Һе’Ӣеҷғе—Һеҳӣ])(?![пјҹ\nпјҒпјҢвҖҰе•Ҡе‘Җеҗ–е–Үе•Ұе–Һе•қеҷғе’©еҗ’е’Ӣе–іе•«е”§е—Һе—ұе‘ўр »№ж·»г–ӯеҳӣе—Һеӣүеӣ–е’Ҝеҗ“])'
replace = '\1пјҢ'

[[rules]]
pattern = '^е•ҠвҖҰ'
replace = ''
