# Sentence-final particle conventions (legacy update_particle_conventions)
# Rules are applied in order, top to bottom, one re.sub pass each.
# Patterns/replacements use TOML literal (single-quoted) strings: backslashes are verbatim.

[[rules]]
pattern = '(?<!衫書十頭招衣帽李咪相棚房高)架(?=[，？…喇啦喎咯囉囖啫])'
replace = '㗎'

[[rules]]
pattern = '[弊閉][喇啦囉]'
replace = '弊喇'

[[rules]]
pattern = '添[，…]'
replace = '𠻹'

[[rules]]
pattern = '添$'
replace = '𠻹'

[[rules]]
pattern = '添，'
replace = '𠻹，'

[[rules]]
pattern = '添(?=[噃啵喎啊呀喇嘞啦㗎])'
replace = '𠻹'

[[rules]]
pattern = '好嗎'
replace = '好嘛'

[[rules]]
pattern = '[啫之姐咋][嗎嘛]'
replace = '吒嘛'

[[rules]]
pattern = '[㗎嘅]嘛'
replace = '𠺢嘛'

[[rules]]
pattern = '[唉哎][啊喲吔]'
replace = '哎吔'

[[rules]]
pattern = '(啊){2,}'
replace = '啊'

[[rules]]
pattern = '哎吔啊'
replace = '哎吔'

[[rules]]
pattern = '冇([嘢事])吖嗎，'
replace = '冇\1吖嘛？'

[[rules]]
pattern = '冇([嘢事])吖嗎(?!？)'
replace = '冇\1吖嘛？'

[[rules]]
pattern = '唔係啊嘛？'
replace = '唔係𠻺嗎？'

[[rules]]
pattern = '唔係啊嘛'
replace = '唔係𠻺嗎？'

[[rules]]
pattern = '好啊嘛'
replace = '好吖嘛'

[[rules]]
pattern = '好吖嘛，'
replace = '好吖嘛？'

[[rules]]
pattern = '啊嘛？'
replace = '𠻺嗎？'

[[rules]]
pattern = '呀嘛'
replace = '𠻺嗎'

[[rules]]
pattern = '^嚟啊'
replace = '嚟吖'

[[rules]]
pattern = '真係啊'
replace = '真係吖'

[[rules]]
