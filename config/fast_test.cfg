# config/fast_test.cfg — zero perf-instrumentation preset for fast local test iteration.
#
# Load with: cantocaptions --cfg fast_test audio.wav
# (equivalent to --cfg=fast_test; standard argparse --flag=value syntax, no custom
# parsing involved)
#
# This is a *partial* overlay: only the keys below are set here. Every other
# PipelineConfig field falls back directly to PipelineConfig.defaults() in
# cantocaptions_ai/pipeline/config.py — named --cfg presets do NOT also load
# config/default.cfg (exactly one cfg file is read per invocation).
#
# Intended for short test clips where turnaround time matters more than
# safety margins: removes StageTimer's tqdm bars/timing summary and the
# proactive VRAM-headroom estimation/logging (which queries
# torch.cuda.mem_get_info() once per model load and once per ASR/alignment
# inference batch). Does NOT skip or change the output of any pipeline
# stage — see CLAUDE.md's "Fast iteration: skip expensive stages" section
# for that separate, output-affecting lever.

[pipeline]
vram_checks = False
print_progress = False

# NOT enabled by default here — these change output quality/content, not
# just instrumentation overhead:
# no_align = True
# vocal_isolation_method = none
# ensemble_model = none
