# config/cpu.cfg — CPU-only preset.
#
# Load with: cantocaptions --cfg cpu audio.wav
# (equivalent to --cfg=cpu; standard argparse --flag=value syntax, no custom
# parsing involved)
#
# This is a *partial* overlay: only the keys below are set here. Every other
# PipelineConfig field falls back directly to PipelineConfig.defaults() in
# cantocaptions_ai/pipeline/config.py — named --cfg presets do NOT also load
# config/default.cfg (exactly one cfg file is read per invocation).
#
# Personal/machine-specific values (hf_token, model_dir, absolute output
# paths, etc.) belong in your own config/default.cfg, not in a shared,
# checked-in preset like this one.

[pipeline]
# No CUDA/MPS device available (or force CPU even with a GPU present, e.g.
# to leave VRAM free for something else running alongside).
device = cpu

# flash_attention_2 requires the optional flash-attn package, which per
# pyproject.toml's `flash-attn` extra only builds on
# sys_platform=='linux' and platform_machine=='x86_64' with a CUDA GPU.
# sdpa is the portable attention backend and runs fine on CPU.
attn_implementation = sdpa

# 'default' already resolves to float32 off CUDA, but pin it explicitly for
# the heavy-model stages rather than relying on each stage's own GPU-detection
# branch of 'default' — float16 isn't supported (or is much slower) on most
# CPU kernels.
asr_compute_type = float32
vocal_isolation_compute_type = float32
align_compute_type = float32

# Uncomment to cap CPU thread usage (otherwise torch/OMP/MKL choose based on
# core count):
# threads = 8
